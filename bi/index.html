<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>BI | Bar Digital</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header><strong>Dashboard BI</strong><button id="atualizar">Atualizar</button></header>
    <section id="loginBox" class="login-box">
      <form id="loginForm" class="login-panel">
        <h1>Entrar no BI</h1>
        <label>E-mail<input id="loginEmail" type="email" value="gerente@demo.com" /></label>
        <label>Senha<input id="loginSenha" type="password" value="123456" /></label>
        <button>Entrar</button>
      </form>
    </section>
    <main id="dashboard">
      <section class="panel filtros">
        <label>Início<input id="dataInicio" type="date" /></label>
        <label>Fim<input id="dataFim" type="date" /></label>
        <button id="filtrar">Filtrar período</button>
        <button id="limparPeriodo">Limpar</button>
      </section>

      <section class="metricas">
        <article><span>Faturamento</span><strong id="faturamento">R$ 0,00</strong></article>
        <article><span>Ticket médio</span><strong id="ticket">R$ 0,00</strong></article>
        <article><span>Tempo preparo</span><strong id="tempo">0 min</strong></article>
        <article><span>Tempo entrega</span><strong id="entrega">0 min</strong></article>
      </section>

      <section class="charts">
        <section class="panel">
          <h2>Faturamento por dia</h2>
          <div id="graficoFaturamento" class="bar-chart"></div>
          <div id="dias"></div>
        </section>
        <section class="panel">
          <h2>Produtos mais vendidos</h2>
          <div id="graficoProdutos" class="rank-chart"></div>
          <div id="produtos"></div>
        </section>
      </section>

      <section class="panel">
        <h2>Volume por status</h2>
        <div id="graficoStatus" class="status-chart"></div>
      </section>
    </main>
    <script src="app.js"></script>
  </body>
</html>
