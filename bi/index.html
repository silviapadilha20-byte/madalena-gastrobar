<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>BI | Bar Digital</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header><strong>Dashboard BI</strong><button id="atualizar">Atualizar</button></header>
    <main>
      <section class="metricas">
        <article><span>Faturamento</span><strong id="faturamento">R$ 0,00</strong></article>
        <article><span>Ticket médio</span><strong id="ticket">R$ 0,00</strong></article>
        <article><span>Tempo preparo</span><strong id="tempo">0 min</strong></article>
      </section>
      <section class="panel">
        <h2>Produtos mais vendidos</h2>
        <div id="produtos"></div>
      </section>
      <section class="panel">
        <h2>Faturamento por dia</h2>
        <div id="dias"></div>
      </section>
    </main>
    <script src="app.js"></script>
  </body>
</html>
